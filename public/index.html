<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mychat - 网页版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --bg2: #1a1a24;
      --bg3: #23232f;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent2: #5b4de0;
      --text: #e8e8f0;
      --text2: #9090a8;
      --bubble-me: #7c6af7;
      --bubble-other: #2a2a38;
      --green: #34c97e;
      --red: #f05c5c;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== AUTH PAGE ===== */
    #auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f13 0%, #1a1228 100%);
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 12px;
    }

    .auth-logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-logo p {
      color: var(--text2);
      font-size: 13px;
      margin-top: 4px;
    }

    .tab-bar {
      display: flex;
      background: var(--bg3);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      color: var(--red);
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ===== MAIN LAYOUT ===== */
    #main-page {
      display: none;
      height: 100vh;
      flex-direction: row;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .avatar.sm { width: 32px; height: 32px; font-size: 13px; }
    .avatar.lg { width: 44px; height: 44px; font-size: 18px; }

    .sidebar-header .info { flex: 1; overflow: hidden; }
    .sidebar-header .info .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-header .info .status {
      font-size: 11px;
      color: var(--green);
    }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      font-size: 18px;
      transition: color 0.2s, background 0.2s;
    }
    .logout-btn:hover { color: var(--red); background: rgba(240,92,92,0.1); }

    .sidebar-search {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-search input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-track { background: transparent; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: var(--radius);
      margin: 1px 8px;
      position: relative;
    }

    .user-item:hover { background: var(--bg3); }
    .user-item.active { background: rgba(124,106,247,0.15); }
    .user-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 2px;
    }

    .user-item .info { flex: 1; overflow: hidden; }
    .user-item .name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-item .last-msg {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      position: absolute;
      bottom: 8px;
      left: 38px;
      border: 2px solid var(--bg2);
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .chat-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text2);
    }

    .chat-placeholder .big-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .chat-placeholder p { font-size: 15px; opacity: 0.6; }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
    }

    .chat-header .info .name { font-size: 15px; font-weight: 600; }
    .chat-header .info .sub { font-size: 12px; color: var(--text2); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg-row.me { flex-direction: row-reverse; }

    .msg-bubble {
      max-width: 60%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }

    .msg-row.me .msg-bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.other .msg-bubble {
      background: var(--bubble-other);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text2);
      margin: 0 4px 2px;
    }

    .msg-bubble img {
      max-width: 220px;
      max-height: 220px;
      border-radius: 10px;
      cursor: pointer;
      display: block;
    }

    .msg-sender {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 2px;
      padding: 0 4px;
    }

    .typing-indicator {
      display: none;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text2);
      font-style: italic;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      font-size: 17px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .input-box {
      flex: 1;
      min-height: 38px;
      max-height: 120px;
      padding: 9px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.4;
      font-family: inherit;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    .input-box:focus { border-color: var(--accent); }
    .input-box::placeholder { color: var(--text2); }

    .send-btn {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-size: 17px;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.92); }

    /* ===== EMOJI PICKER ===== */
    .emoji-picker {
      display: none;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-wrap: wrap;
      gap: 4px;
      max-height: 130px;
      overflow-y: auto;
    }

    .emoji-picker.show { display: flex; }

    .emoji-btn {
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .emoji-btn:hover { background: var(--bg3); }

    /* ===== IMAGE PREVIEW MODAL ===== */
    #img-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #img-modal.show { display: flex; }
    #img-modal img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
    }

    /* ===== DATE DIVIDER ===== */
    .date-divider {
      text-align: center;
      color: var(--text2);
      font-size: 11px;
      padding: 8px 0;
      position: relative;
    }

    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }

    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .sidebar { width: 100%; display: none; }
      .sidebar.mobile-show { display: flex; position: absolute; z-index: 100; height: 100%; }
      .chat-area { width: 100%; }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ===== AUTH PAGE ===== -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">💬</div>
      <h1>mychat</h1>
      <p>网页版 · 随时随地聊天</p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login')">登录</button>
      <button class="tab-btn" onclick="switchTab('register')">注册</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" />
      </div>
      <button class="btn-primary" onclick="doLogin()">登 录</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="设置用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="设置密码（至少6位）" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="reg-password2" placeholder="再次输入密码" autocomplete="new-password" />
      </div>
      <button class="btn-primary" onclick="doRegister()">注 册</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ===== MAIN PAGE ===== -->
<div id="main-page">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="avatar lg" id="my-avatar">?</div>
      <div class="info">
        <div class="name" id="my-name">--</div>
        <div class="status">● 在线</div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="退出登录">⏻</button>
    </div>

    <div class="sidebar-search">
      <input type="text" placeholder="🔍 搜索用户..." id="search-input" oninput="filterUsers()" />
    </div>

    <div class="user-list" id="user-list">
      <div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">加载中...</div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chat-area">
    <div class="chat-placeholder" id="chat-placeholder">
      <div class="big-icon">💬</div>
      <p>选择一个联系人开始聊天</p>
    </div>

    <div id="chat-window" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="avatar sm" id="chat-avatar">?</div>
        <div class="info">
          <div class="name" id="chat-name">--</div>
          <div class="sub" id="chat-sub">--</div>
        </div>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typing-indicator">对方正在输入...</div>

      <div class="emoji-picker" id="emoji-picker"></div>

      <div class="input-area">
        <div class="input-actions">
          <div class="icon-btn" onclick="toggleEmoji()" title="表情">😊</div>
          <div class="icon-btn" onclick="document.getElementById('file-input').click()" title="发送图片">🖼</div>
        </div>
        <textarea class="input-box" id="msg-input" placeholder="输入消息..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()" title="发送">➤</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadImage(event)" />

<div id="img-modal" onclick="this.classList.remove('show')">
  <img id="img-modal-img" src="" alt="" />
</div>

<div id="toast"></div>

<script>
// ===== CONFIG =====
const SERVER = location.origin;
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

// ===== STATE =====
let me = null;       // { id, username, token }
let currentChat = null; // { id, username }
let ws = null;
let users = [];
let unread = {};     // { userId: count }
let msgCache = {};   // { userId: [msgs] }

const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','😭','😡','🥺','😱','👍','👎','👏','🙏','🤝','❤️','🔥','✨','🎉','🎊','😏','🤔','😴','🤣','😇','🙄','😤','🤗','🥳','🫡'];

// ===== AUTH =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===(tab==='login'?0:1)));
  document.getElementById('login-form').style.display = tab==='login'?'':'none';
  document.getElementById('register-form').style.display = tab==='register'?'':'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return setAuthError('请填写用户名和密码');
  const btn = document.querySelector('#login-form .btn-primary');
  btn.disabled = true; btn.textContent = '登录中...';
  try {
    const r = await fetch(`${SERVER}/api/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || '登录失败');
    enterApp(d.token, d.user);
  } catch(e) {
    setAuthError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  if (!username || !password) return setAuthError('请填写完整信息');
  if (password.length < 6) return setAuthError('密码至少6位');
  if (password !== password2) return setAuthError('两次密码不一致');
  const btn = document.querySelector('#register-form .btn-primary');
  btn.disabled = true; btn.textContent = '注册中...';
  try {
    const r = await fetch(`${SERVER}/api/register`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || '注册失败');
    enterApp(d.token, d.user);
  } catch(e) {
    setAuthError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
}

function setAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

function enterApp(token, user) {
  me = { ...user, token };
  localStorage.setItem('mc_token', token);
  localStorage.setItem('mc_user', JSON.stringify(user));
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'flex';
  document.getElementById('my-name').textContent = me.username;
  document.getElementById('my-avatar').textContent = me.username[0].toUpperCase();
  initEmojis();
  loadUsers();
  connectWS();
}

function doLogout() {
  if (ws) ws.close();
  me = null; currentChat = null; users = []; unread = {}; msgCache = {};
  localStorage.removeItem('mc_token');
  localStorage.removeItem('mc_user');
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('chat-window').style.display = 'none';
  document.getElementById('chat-placeholder').style.display = 'flex';
}

// ===== USER LIST =====
async function loadUsers() {
  try {
    const r = await fetch(`${SERVER}/api/users/${me.id}`, {
      headers: { 'Authorization': `Bearer ${me.token}` }
    });
    const d = await r.json();
    users = d.users || [];
    renderUserList();
    // 每30秒刷新一次用户列表
    setTimeout(loadUsers, 30000);
  } catch(e) {
    console.error('loadUsers error:', e);
  }
}

function renderUserList(filter = '') {
  const list = document.getElementById('user-list');
  const filtered = filter
    ? users.filter(u => u.username.toLowerCase().includes(filter.toLowerCase()))
    : users;

  if (!filtered.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">${filter?'没有找到用户':'暂无其他用户'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(u => {
    const isActive = currentChat && currentChat.id === u.id;
    const cnt = unread[u.id] || 0;
    const lastMsg = (msgCache[u.id]||[]).slice(-1)[0];
    const preview = lastMsg ? truncate(lastMsg.content, 20) : '点击开始聊天';
    return `
      <div class="user-item${isActive?' active':''}" onclick="openChat('${u.id}','${escHtml(u.username)}')">
        <div class="avatar sm">${u.username[0].toUpperCase()}</div>
        <div class="info">
          <div class="name">${escHtml(u.username)}</div>
          <div class="last-msg">${escHtml(preview)}</div>
        </div>
        ${cnt>0?`<span class="badge">${cnt}</span>`:''}
      </div>
    `;
  }).join('');
}

function filterUsers() {
  renderUserList(document.getElementById('search-input').value);
}

// ===== CHAT =====
async function openChat(userId, username) {
  currentChat = { id: userId, username };
  unread[userId] = 0;
  document.getElementById('chat-placeholder').style.display = 'none';
  const cw = document.getElementById('chat-window');
  cw.style.display = 'flex';
  document.getElementById('chat-avatar').textContent = username[0].toUpperCase();
  document.getElementById('chat-name').textContent = username;
  document.getElementById('chat-sub').textContent = '正在获取消息...';
  renderUserList(document.getElementById('search-input').value);

  // 加载历史消息
  await loadMessages(userId);
  document.getElementById('msg-input').focus();
}

async function loadMessages(userId) {
  try {
    const r = await fetch(`${SERVER}/api/messages/${me.id}/${userId}`, {
      headers: { 'Authorization': `Bearer ${me.token}` }
    });
    const d = await r.json();
    msgCache[userId] = d.messages || [];
    renderMessages();
    document.getElementById('chat-sub').textContent = `${msgCache[userId].length} 条消息`;
  } catch(e) {
    document.getElementById('chat-sub').textContent = '加载失败';
  }
}

function renderMessages() {
  if (!currentChat) return;
  const msgs = msgCache[currentChat.id] || [];
  const container = document.getElementById('messages');
  let lastDate = '';

  container.innerHTML = msgs.map(m => {
    const isMe = String(m.from_user) === String(me.id);
    const ts = m.created_at * 1000;
    const dateStr = formatDate(ts);
    let divider = '';
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      divider = `<div class="date-divider">${dateStr}</div>`;
    }
    const timeStr = formatTime(ts);
    const isImg = m.content.startsWith('http') && /\.(jpg|jpeg|png|gif|webp)/i.test(m.content);
    const bubbleContent = isImg
      ? `<img src="${escHtml(m.content)}" onclick="showImg('${escHtml(m.content)}')" />`
      : escHtml(m.content).replace(/\n/g, '<br>');
    return `
      ${divider}
      <div class="msg-row ${isMe?'me':'other'}">
        ${!isMe?`<div class="avatar sm">${m.from_username?m.from_username[0].toUpperCase():'?'}</div>`:''}
        <div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">
          ${!isMe?`<div class="msg-sender">${escHtml(m.from_username||'')}</div>`:''}
          <div class="msg-bubble">${bubbleContent}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      </div>
    `;
  }).join('');

  scrollToBottom();
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ===== SEND =====
function sendMessage() {
  if (!currentChat || !ws || ws.readyState !== WebSocket.OPEN) return;
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;

  ws.send(JSON.stringify({
    type: 'send_message',
    toUserId: currentChat.id,
    content,
    msgType: 'text'
  }));

  input.value = '';
  autoResize(input);
  closeEmoji();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== WEBSOCKET =====
let wsReconnectTimer = null;
let wsReconnectDelay = 2000;

function connectWS() {
  if (!me) return;
  if (ws) { try { ws.close(); } catch {} }

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log('WS 已连接');
    wsReconnectDelay = 2000;
    ws.send(JSON.stringify({ type: 'auth', token: me.token }));
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    if (data.type === 'auth_ok') {
      showToast('已连接到服务器 ✓');
      return;
    }

    if (data.type === 'new_message') {
      const fromId = String(data.fromUserId);
      const msg = {
        id: data.id,
        from_user: fromId,
        to_user: String(data.toUserId),
        content: data.content,
        created_at: data.createdAt,
        from_username: data.fromUsername,
      };
      if (!msgCache[fromId]) msgCache[fromId] = [];
      msgCache[fromId].push(msg);

      if (currentChat && currentChat.id === fromId) {
        renderMessages();
      } else {
        unread[fromId] = (unread[fromId] || 0) + 1;
        renderUserList(document.getElementById('search-input').value);
        // 浏览器通知
        showNotification(data.fromUsername, data.content);
      }
    }

    if (data.type === 'message_sent') {
      const toId = String(data.toUserId);
      const msg = {
        id: data.id,
        from_user: String(me.id),
        to_user: toId,
        content: data.content,
        created_at: data.createdAt,
        from_username: me.username,
      };
      if (!msgCache[toId]) msgCache[toId] = [];
      msgCache[toId].push(msg);
      if (currentChat && currentChat.id === toId) {
        renderMessages();
      }
      renderUserList(document.getElementById('search-input').value);
    }
  };

  ws.onclose = () => {
    console.log('WS 断开，', wsReconnectDelay/1000, 's后重连');
    if (me) {
      wsReconnectTimer = setTimeout(() => {
        wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 30000);
        connectWS();
      }, wsReconnectDelay);
    }
  };

  ws.onerror = () => { ws.close(); };
}

// ===== IMAGE UPLOAD =====
async function uploadImage(e) {
  const file = e.target.files[0];
  if (!file || !currentChat) return;
  e.target.value = '';
  showToast('上传中...');

  try {
    const form = new FormData();
    form.append('image', file);
    const r = await fetch(`${SERVER}/api/upload`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${me.token}` },
      body: form
    });
    const d = await r.json();
    if (!d.url) throw new Error('上传失败');

    // 发送图片URL作为消息
    ws.send(JSON.stringify({
      type: 'send_message',
      toUserId: currentChat.id,
      content: d.url,
      msgType: 'image'
    }));
    showToast('图片发送成功 ✓');
  } catch(err) {
    showToast('图片上传失败');
  }
}

function showImg(url) {
  document.getElementById('img-modal-img').src = url;
  document.getElementById('img-modal').classList.add('show');
}

// ===== EMOJI =====
function initEmojis() {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = EMOJIS.map(e =>
    `<span class="emoji-btn" onclick="insertEmoji('${e}')">${e}</span>`
  ).join('');
}

function toggleEmoji() {
  document.getElementById('emoji-picker').classList.toggle('show');
}

function closeEmoji() {
  document.getElementById('emoji-picker').classList.remove('show');
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

// ===== NOTIFICATION =====
function showNotification(from, content) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`mychat - ${from}`, {
      body: content.startsWith('http') ? '[图片]' : content,
      icon: '/favicon.ico'
    });
  }
}

function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ===== TOAST =====
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== UTILS =====
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return '今天';
  const yesterday = new Date(today - 86400000);
  if (d.toDateString() === yesterday.toDateString()) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function formatTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== INIT =====
// Enter key on auth inputs
document.getElementById('login-password').addEventListener('keydown', e => e.key==='Enter' && doLogin());
document.getElementById('login-username').addEventListener('keydown', e => e.key==='Enter' && doLogin());
document.getElementById('reg-password2').addEventListener('keydown', e => e.key==='Enter' && doRegister());

// Auto-login from localStorage
(function() {
  const token = localStorage.getItem('mc_token');
  const user = localStorage.getItem('mc_user');
  if (token && user) {
    try {
      enterApp(token, JSON.parse(user));
    } catch {}
  }
})();

// Request notification permission
setTimeout(requestNotifPerm, 2000);
</script>

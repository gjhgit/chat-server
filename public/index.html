<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mychat - 网页版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --bg2: #1a1a24;
      --bg3: #23232f;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent2: #5b4de0;
      --text: #e8e8f0;
      --text2: #9090a8;
      --bubble-me: #7c6af7;
      --bubble-other: #2a2a38;
      --green: #34c97e;
      --red: #f05c5c;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== AUTH PAGE ===== */
    #auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f13 0%, #1a1228 100%);
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 12px;
    }

    .auth-logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-logo p {
      color: var(--text2);
      font-size: 13px;
      margin-top: 4px;
    }

    .tab-bar {
      display: flex;
      background: var(--bg3);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      color: var(--red);
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ===== MAIN LAYOUT ===== */
    #main-page {
      display: none;
      height: 100vh;
      flex-direction: row;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .avatar.sm { width: 32px; height: 32px; font-size: 13px; }
    .avatar.lg { width: 44px; height: 44px; font-size: 18px; }

    .sidebar-header .info { flex: 1; overflow: hidden; }
    .sidebar-header .info .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-header .info .status {
      font-size: 11px;
      color: var(--green);
    }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      font-size: 18px;
      transition: color 0.2s, background 0.2s;
    }
    .logout-btn:hover { color: var(--red); background: rgba(240,92,92,0.1); }

    .sidebar-search {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-search input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-track { background: transparent; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: var(--radius);
      margin: 1px 8px;
      position: relative;
    }

    .user-item:hover { background: var(--bg3); }
    .user-item.active { background: rgba(124,106,247,0.15); }
    .user-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 2px;
    }

    .user-item .info { flex: 1; overflow: hidden; }
    .user-item .name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-item .last-msg {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      position: absolute;
      bottom: 8px;
      left: 38px;
      border: 2px solid var(--bg2);
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .chat-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text2);
    }

    .chat-placeholder .big-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .chat-placeholder p { font-size: 15px; opacity: 0.6; }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
    }

    .chat-header .info .name { font-size: 15px; font-weight: 600; }
    .chat-header .info .sub { font-size: 12px; color: var(--text2); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 100%;
    }

    .msg-row.me { flex-direction: row-reverse; }

    .msg-row .msg-content-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 70%;
    }

    .msg-row.me .msg-content-wrap {
      align-items: flex-end;
    }

    .msg-bubble {
      max-width: 60%;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      word-wrap: break-word;
      white-space: pre-wrap;
      position: relative;
    }

    .msg-row.me .msg-bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.other .msg-bubble {
      background: var(--bubble-other);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text2);
      margin: 0 4px 2px;
    }

    .msg-bubble img {
      max-width: 220px;
      max-height: 220px;
      border-radius: 10px;
      cursor: pointer;
      display: block;
    }

    .msg-sender {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 2px;
      padding: 0 4px;
    }

    .typing-indicator {
      display: none;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text2);
      font-style: italic;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      font-size: 17px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .input-box {
      flex: 1;
      min-height: 38px;
      max-height: 120px;
      padding: 9px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.4;
      font-family: inherit;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    .input-box:focus { border-color: var(--accent); }
    .input-box::placeholder { color: var(--text2); }

    .send-btn {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-size: 17px;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.92); }

    /* ===== EMOJI PICKER ===== */
    .emoji-picker {
      display: none;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-wrap: wrap;
      gap: 4px;
      max-height: 130px;
      overflow-y: auto;
    }

    .emoji-picker.show { display: flex; }

    .emoji-btn {
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .emoji-btn:hover { background: var(--bg3); }

    /* ===== IMAGE PREVIEW MODAL ===== */
    #img-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #img-modal.show { display: flex; }
    #img-modal img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
    }

    /* ===== DATE DIVIDER ===== */
    .date-divider {
      text-align: center;
      color: var(--text2);
      font-size: 11px;
      padding: 8px 0;
      position: relative;
    }

    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }

    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .sidebar { width: 100%; display: none; }
      .sidebar.mobile-show { display: flex; position: absolute; z-index: 100; height: 100%; }
      .chat-area { width: 100%; }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== PING MODAL ===== */
    #ping-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #ping-modal.show { display: flex; }

    .ping-dialog {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 480px;
      max-width: 96vw;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ping-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ping-header h2 {
      font-size: 17px;
      font-weight: 700;
      flex: 1;
    }

    .ping-header .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--bg3);
      color: var(--text2);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .ping-header .close-btn:hover { background: var(--red); color: #fff; }

    .ping-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ping-input-row input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Menlo', 'Consolas', monospace;
    }
    .ping-input-row input:focus { border-color: var(--accent); }

    .ping-input-row select {
      padding: 10px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .ping-run-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ping-run-btn:hover { opacity: 0.9; }
    .ping-run-btn:active { transform: scale(0.97); }
    .ping-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .ping-result-box {
      background: #0d0d12;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.8;
      color: #c0c0d0;
      min-height: 120px;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .ping-result-box .line-ok   { color: #34c97e; }
    .ping-result-box .line-fail { color: #f05c5c; }
    .ping-result-box .line-info { color: #a78bfa; }
    .ping-result-box .line-stat { color: #fbbf24; }
    .ping-result-box .line-dim  { color: #5a5a72; }

    .ping-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ping-preset-btn {
      padding: 4px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ping-preset-btn:hover {
      background: rgba(124,106,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .ping-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text2);
      min-height: 20px;
    }

    .ping-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .ping-spinner.running { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ping 按钮放在 sidebar-header */
    .ping-icon-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      font-size: 18px;
      transition: color 0.2s, background 0.2s;
    }
    .ping-icon-btn:hover { color: var(--accent); background: rgba(124,106,247,0.12); }

    /* ===== BROWSER MODAL ===== */
    #browser-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2100;
      /* 全屏覆盖，无背景遮罩，直接顶满 */
    }
    #browser-modal.show { display: flex; flex-direction: column; }

    .browser-dialog {
      background: var(--bg2);
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* 无圆角、无阴影——真全屏 */
    }

    /* 顶部工具栏 */
    .browser-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .browser-traffic {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .browser-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
    }
    .browser-dot.red   { background: #ff5f57; }
    .browser-dot.yellow{ background: #febc2e; }
    .browser-dot.green { background: #28c840; }
    .browser-dot.red:hover   { background: #ff3b30; }
    .browser-dot.yellow:hover{ background: #ff9500; }
    .browser-dot.green:hover { background: #34c759; }

    .browser-nav-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 7px;
      border-radius: 7px;
      transition: all 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .browser-nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .browser-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .browser-address-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      gap: 6px;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .browser-address-bar:focus-within { border-color: var(--accent); }

    .browser-lock-icon { font-size: 12px; color: #34c97e; flex-shrink: 0; }
    .browser-lock-icon.insecure { color: var(--text2); }

    .browser-addr-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: 'Menlo', 'Consolas', monospace;
      padding: 7px 0;
      min-width: 0;
    }

    .browser-go-btn {
      padding: 5px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .browser-go-btn:hover { opacity: 0.85; }
    .browser-go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 状态/加载栏 */
    .browser-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      font-size: 11px;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
      min-height: 26px;
    }

    /* 顶部加载进度条 */
    .browser-progress-bar {
      position: absolute;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #a78bfa, var(--accent2));
      transition: width 0.25s ease, opacity 0.4s ease;
      z-index: 10;
      border-radius: 0 2px 2px 0;
      box-shadow: 0 0 8px rgba(124,106,247,0.8);
      opacity: 0;
    }
    .browser-progress-bar.loading {
      opacity: 1;
    }
    .browser-progress-bar.done {
      width: 100% !important;
      opacity: 0;
      transition: width 0.15s ease, opacity 0.5s ease 0.1s;
    }

    .browser-spinner {
      width: 11px; height: 11px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .browser-spinner.running { display: block; }

    /* 内容区 */
    .browser-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .browser-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .browser-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text2);
    }

    .browser-placeholder .big-icon { font-size: 56px; opacity: 0.3; }

    .browser-placeholder p {
      font-size: 14px;
      opacity: 0.5;
      max-width: 320px;
      text-align: center;
      line-height: 1.6;
    }

    .browser-error-box {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      box-sizing: border-box;
    }
    .browser-error-box.show { display: flex; }

    .browser-error-icon { font-size: 48px; }

    .browser-error-msg {
      color: var(--text2);
      font-size: 14px;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      background: rgba(240,92,92,0.08);
      border: 1px solid rgba(240,92,92,0.2);
      border-radius: 12px;
      padding: 14px 18px;
    }

    /* 浏览器按钮（在 sidebar-header 里） */
    .browser-icon-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      font-size: 18px;
      transition: color 0.2s, background 0.2s;
    }
    .browser-icon-btn:hover { color: var(--accent); background: rgba(124,106,247,0.12); }

    /* 快速书签 */
    .browser-bookmarks {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-wrap: nowrap;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .browser-bookmark {
      padding: 3px 10px;
      font-size: 11.5px;
      color: var(--text2);
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
      transition: all 0.15s;
      border: none;
      background: none;
    }
    .browser-bookmark:hover {
      background: rgba(124,106,247,0.12);
      color: var(--accent);
    }
  </style>
</head>
<body>

<!-- ===== AUTH PAGE ===== -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">💬</div>
      <h1>mychat</h1>
      <p>网页版 · 随时随地聊天</p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login')">登录</button>
      <button class="tab-btn" onclick="switchTab('register')">注册</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" />
      </div>
      <button class="btn-primary" onclick="doLogin()">登 录</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="设置用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="设置密码（至少6位）" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="reg-password2" placeholder="再次输入密码" autocomplete="new-password" />
      </div>
      <button class="btn-primary" onclick="doRegister()">注 册</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ===== MAIN PAGE ===== -->
<div id="main-page">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="avatar lg" id="my-avatar">?</div>
      <div class="info">
        <div class="name" id="my-name">--</div>
        <div class="status">● 在线</div>
      </div>
      <button class="browser-icon-btn" onclick="openBrowser()" title="内置浏览器">🖥️</button>
      <button class="ping-icon-btn" onclick="openPing()" title="网络 Ping 检测">🌐</button>
      <button class="logout-btn" onclick="doLogout()" title="退出登录">⏻</button>
    </div>

    <div class="sidebar-search">
      <input type="text" placeholder="🔍 搜索用户..." id="search-input" oninput="filterUsers()" />
    </div>

    <div class="user-list" id="user-list">
      <div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">加载中...</div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chat-area">
    <div class="chat-placeholder" id="chat-placeholder">
      <div class="big-icon">💬</div>
      <p>选择一个联系人开始聊天</p>
    </div>

    <div id="chat-window" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="avatar sm" id="chat-avatar">?</div>
        <div class="info">
          <div class="name" id="chat-name">--</div>
          <div class="sub" id="chat-sub">--</div>
        </div>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typing-indicator">对方正在输入...</div>

      <div class="emoji-picker" id="emoji-picker"></div>

      <div class="input-area">
        <div class="input-actions">
          <div class="icon-btn" onclick="toggleEmoji()" title="表情">😊</div>
          <div class="icon-btn" onclick="document.getElementById('file-input').click()" title="发送图片">🖼</div>
        </div>
        <textarea class="input-box" id="msg-input" placeholder="输入消息..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()" title="发送">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== BROWSER MODAL ===== -->
<div id="browser-modal">
  <div class="browser-dialog">
    <!-- 顶部进度条 -->
    <div class="browser-progress-bar" id="brow-progress"></div>

    <!-- 工具栏 -->
    <div class="browser-toolbar">
      <!-- 红黄绿三点 -->
      <div class="browser-traffic">
        <div class="browser-dot red"    onclick="closeBrowser()" title="关闭浏览器"></div>
        <div class="browser-dot yellow" title="（已全屏）"></div>
        <div class="browser-dot green"  title="已全屏"></div>
      </div>

      <!-- 导航按钮 -->
      <button class="browser-nav-btn" id="brow-back"    onclick="browserBack()"    title="后退"  disabled>&#8592;</button>
      <button class="browser-nav-btn" id="brow-forward" onclick="browserForward()" title="前进"  disabled>&#8594;</button>
      <button class="browser-nav-btn" id="brow-refresh" onclick="browserRefresh()" title="刷新">&#8635;</button>
      <button class="browser-nav-btn" id="brow-home"    onclick="browserHome()"    title="主页">⌂</button>

      <!-- 地址栏 -->
      <div class="browser-address-bar">
        <span class="browser-lock-icon" id="brow-lock">🔒</span>
        <input class="browser-addr-input" id="brow-addr" type="text"
          placeholder="输入网址，如 www.baidu.com"
          value="www.google.com"
          spellcheck="false"
          onkeydown="if(event.key==='Enter')browserGo()" />
      </div>

      <button class="browser-go-btn" id="brow-go-btn" onclick="browserGo()">前往</button>
    </div>

    <!-- 书签栏 -->
    <div class="browser-bookmarks">
      <span style="font-size:11px;color:var(--text2);margin-right:4px;flex-shrink:0;">书签：</span>
      <button class="browser-bookmark" onclick="browserNav('https://www.google.com')">🔍 Google</button>
      <button class="browser-bookmark" onclick="browserNav('https://www.baidu.com')">百度</button>
      <button class="browser-bookmark" onclick="browserNav('https://www.bing.com')">Bing</button>
      <button class="browser-bookmark" onclick="browserNav('https://github.com')">GitHub</button>
      <button class="browser-bookmark" onclick="browserNav('https://www.wikipedia.org')">维基百科</button>
      <button class="browser-bookmark" onclick="browserNav('https://www.bilibili.com')">哔哩哔哩</button>
      <button class="browser-bookmark" onclick="browserNav('https://news.ycombinator.com')">Hacker News</button>
    </div>

    <!-- 状态栏 -->
    <div class="browser-status-bar">
      <div class="browser-spinner" id="brow-spinner"></div>
      <span id="brow-status">准备就绪</span>
    </div>

    <!-- 内容区 -->
    <div class="browser-content" id="brow-content">
      <!-- 占位页 -->
      <div class="browser-placeholder" id="brow-placeholder">
        <div class="big-icon">🖥️</div>
        <p>输入网址后点击「前往」<br>内容将在此处展示</p>
        <p style="font-size:12px;opacity:0.4;">由服务端代理访问，不受跨域限制</p>

      <!-- 错误页 -->
      <div class="browser-error-box" id="brow-error">

<div id="ping-modal" onclick="if(event.target===this)closePing()">
  <div class="ping-dialog">

      <span style="font-size:20px">🌐</span>
      <h2>网络 Ping 检测</h2>

    <!-- 预设地址 -->

      <button class="ping-preset-btn" onclick="setPingHost('www.baidu.com')">百度</button>
      <button class="ping-preset-btn" onclick="setPingHost('www.cloudflare.com')">Cloudflare</button>
      <button class="ping-preset-btn" onclick="setPingHost('github.com')">GitHub</button>

    <!-- 状态栏 -->

      <div class="ping-spinner" id="ping-spinner"></div>
      <span id="ping-status-text">准备就绪</span>
    </div>

    <!-- 结果框 -->

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadImage(event)" />

<div id="img-modal" onclick="this.classList.remove('show')">
  <img id="img-modal-img" src="" alt="" />
</div>

<div id="toast"></div>

<script>
// ===== CONFIG =====
const SERVER = location.origin;
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

// ===== STATE =====
let me = null;       // { id, username, token }
let currentChat = null; // { id, username }
let ws = null;
let users = [];
let unread = {};     // { userId: count }
let msgCache = {};   // { userId: [msgs] }

const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','😭','😡','🥺','😱','👍','👎','👏','🙏','🤝','❤️','🔥','✨','🎉','🎊','😏','🤔','😴','🤣','😇','🙄','😤','🤗','🥳','🫡'];

// ===== AUTH =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===(tab==='login'?0:1)));
  document.getElementById('login-form').style.display = tab==='login'?'':'none';
  document.getElementById('register-form').style.display = tab==='register'?'':'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return setAuthError('请填写用户名和密码');
  const btn = document.querySelector('#login-form .btn-primary');
  btn.disabled = true; btn.textContent = '登录中...';
  try {
    const r = await fetch(`${SERVER}/api/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || '登录失败');
    enterApp(d.token, d.user);
  } catch(e) {
    setAuthError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  if (!username || !password) return setAuthError('请填写完整信息');
  if (password.length < 6) return setAuthError('密码至少6位');
  if (password !== password2) return setAuthError('两次密码不一致');
  const btn = document.querySelector('#register-form .btn-primary');
  btn.disabled = true; btn.textContent = '注册中...';
  try {
    const r = await fetch(`${SERVER}/api/register`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || '注册失败');
    enterApp(d.token, d.user);
  } catch(e) {
    setAuthError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
}

function setAuthError(msg) {
  document.getElementById('auth-error').textContent = msg;
}

function enterApp(token, user) {
  me = { ...user, token };
  localStorage.setItem('mc_token', token);
  localStorage.setItem('mc_user', JSON.stringify(user));
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'flex';
  document.getElementById('my-name').textContent = me.username;
  document.getElementById('my-avatar').textContent = me.username[0].toUpperCase();
  initEmojis();
  loadUsers();
  connectWS();
}

function doLogout() {
  if (ws) ws.close();
  me = null; currentChat = null; users = []; unread = {}; msgCache = {};
  localStorage.removeItem('mc_token');
  localStorage.removeItem('mc_user');
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('chat-window').style.display = 'none';
  document.getElementById('chat-placeholder').style.display = 'flex';
}

// ===== USER LIST =====
async function loadUsers() {
  try {
    const r = await fetch(`${SERVER}/api/users/${me.id}`, {
      headers: { 'Authorization': `Bearer ${me.token}` }
    });
    const d = await r.json();
    users = d.users || [];
    renderUserList();
    // 每30秒刷新一次用户列表
    setTimeout(loadUsers, 30000);
  } catch(e) {
    console.error('loadUsers error:', e);
  }
}

function renderUserList(filter = '') {
  const list = document.getElementById('user-list');
  const filtered = filter
    ? users.filter(u => u.username.toLowerCase().includes(filter.toLowerCase()))
    : users;

  if (!filtered.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">${filter?'没有找到用户':'暂无其他用户'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(u => {
    const isActive = currentChat && currentChat.id === u.id;
    const cnt = unread[u.id] || 0;
    const lastMsg = (msgCache[u.id]||[]).slice(-1)[0];
    const preview = lastMsg ? truncate(lastMsg.content, 20) : '点击开始聊天';
    return `
      <div class="user-item${isActive?' active':''}" onclick="openChat('${u.id}','${escHtml(u.username)}')">
        <div class="avatar sm">${u.username[0].toUpperCase()}</div>
        <div class="info">
          <div class="name">${escHtml(u.username)}</div>
          <div class="last-msg">${escHtml(preview)}</div>
        </div>
        ${cnt>0?`<span class="badge">${cnt}</span>`:''}
      </div>
    `;
  }).join('');
}

function filterUsers() {
  renderUserList(document.getElementById('search-input').value);
}

// ===== CHAT =====
async function openChat(userId, username) {
  currentChat = { id: userId, username };
  unread[userId] = 0;
  updateTitleBadge();
  document.getElementById('chat-placeholder').style.display = 'none';
  const cw = document.getElementById('chat-window');
  cw.style.display = 'flex';
  document.getElementById('chat-avatar').textContent = username[0].toUpperCase();
  document.getElementById('chat-name').textContent = username;
  document.getElementById('chat-sub').textContent = '正在获取消息...';
  renderUserList(document.getElementById('search-input').value);

  // 加载历史消息
  await loadMessages(userId);
  document.getElementById('msg-input').focus();
}

async function loadMessages(userId) {
  try {
    const r = await fetch(`${SERVER}/api/messages/${me.id}/${userId}`, {
      headers: { 'Authorization': `Bearer ${me.token}` }
    });
    const d = await r.json();
    msgCache[userId] = d.messages || [];
    renderMessages();
    document.getElementById('chat-sub').textContent = `${msgCache[userId].length} 条消息`;
  } catch(e) {
    document.getElementById('chat-sub').textContent = '加载失败';
  }
}

function renderMessages() {
  if (!currentChat) return;
  const msgs = msgCache[currentChat.id] || [];
  const container = document.getElementById('messages');
  let lastDate = '';

  container.innerHTML = msgs.map(m => {
    const isMe = String(m.from_user) === String(me.id);
    const ts = m.created_at * 1000;
    const dateStr = formatDate(ts);
    let divider = '';
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      divider = `<div class="date-divider">${dateStr}</div>`;
    }
    const timeStr = formatTime(ts);
    const isImg = m.content.startsWith('http') && /\.(jpg|jpeg|png|gif|webp)/i.test(m.content);
    const bubbleContent = isImg
      ? `<img src="${escHtml(m.content)}" onclick="showImg('${escHtml(m.content)}')" />`
      : escHtml(m.content);
    return `
      ${divider}
      <div class="msg-row ${isMe?'me':'other'}">
        ${!isMe?`<div class="avatar sm">${m.from_username?m.from_username[0].toUpperCase():'?'}</div>`:''}
        <div class="msg-content-wrap">
          ${!isMe?`<div class="msg-sender">${escHtml(m.from_username||'')}</div>`:''}
          <div class="msg-bubble">${bubbleContent}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      </div>
    `;
  }).join('');

  scrollToBottom();
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ===== SEND =====
function sendMessage() {
  if (!currentChat || !ws || ws.readyState !== WebSocket.OPEN) return;
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;

  ws.send(JSON.stringify({
    type: 'send_message',
    toUserId: currentChat.id,
    content,
    msgType: 'text'
  }));

  input.value = '';
  autoResize(input);
  closeEmoji();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== WEBSOCKET =====
let wsReconnectTimer = null;
let wsReconnectDelay = 2000;

function connectWS() {
  if (!me) return;
  if (ws) { try { ws.close(); } catch {} }

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log('WS 已连接');
    wsReconnectDelay = 2000;
    ws.send(JSON.stringify({ type: 'auth', token: me.token }));
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    if (data.type === 'auth_ok') {
      showToast('已连接到服务器 ✓');
      return;
    }

    if (data.type === 'new_message') {
      const fromId = String(data.fromUserId);
      const msg = {
        id: data.id,
        from_user: fromId,
        to_user: String(data.toUserId),
        content: data.content,
        created_at: data.createdAt,
        from_username: data.fromUsername,
      };
      if (!msgCache[fromId]) msgCache[fromId] = [];
      msgCache[fromId].push(msg);

      if (currentChat && currentChat.id === fromId) {
        renderMessages();
      } else {
        unread[fromId] = (unread[fromId] || 0) + 1;
        renderUserList(document.getElementById('search-input').value);
        // 浏览器通知
        showNotification(data.fromUsername, data.content);
        // 页面 title 显示未读总数
        updateTitleBadge();
        // 提示音
        playBeep();
      }
    }

    if (data.type === 'message_sent') {
      const toId = String(data.toUserId);
      const msg = {
        id: data.id,
        from_user: String(me.id),
        to_user: toId,
        content: data.content,
        created_at: data.createdAt,
        from_username: me.username,
      };
      if (!msgCache[toId]) msgCache[toId] = [];
      msgCache[toId].push(msg);
      if (currentChat && currentChat.id === toId) {
        renderMessages();
      }
      renderUserList(document.getElementById('search-input').value);
    }
  };

  ws.onclose = () => {
    console.log('WS 断开，', wsReconnectDelay/1000, 's后重连');
    if (me) {
      wsReconnectTimer = setTimeout(() => {
        wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 30000);
        connectWS();
      }, wsReconnectDelay);
    }
  };

  ws.onerror = () => { ws.close(); };
}

// ===== IMAGE UPLOAD =====
async function uploadImage(e) {
  const file = e.target.files[0];
  if (!file || !currentChat) return;
  e.target.value = '';
  showToast('上传中...');

  try {
    const form = new FormData();
    form.append('image', file);
    const r = await fetch(`${SERVER}/api/upload`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${me.token}` },
      body: form
    });
    const d = await r.json();
    if (!d.url) throw new Error('上传失败');

    // 发送图片URL作为消息
    ws.send(JSON.stringify({
      type: 'send_message',
      toUserId: currentChat.id,
      content: d.url,
      msgType: 'image'
    }));
    showToast('图片发送成功 ✓');
  } catch(err) {
    showToast('图片上传失败');
  }
}

}

function initEmojis() {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = EMOJIS.map(e =>
    `<span class="emoji-btn" onclick="insertEmoji('${e}')">${e}</span>`
  ).join('');
}

function toggleEmoji() {
  document.getElementById('emoji-picker').classList.toggle('show');
}

function closeEmoji() {
  document.getElementById('emoji-picker').classList.remove('show');
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

// ===== NOTIFICATION =====
function showNotification(from, content) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`mychat - ${from}`, {
      body: content.startsWith('http') ? '[图片]' : content,
      icon: '/favicon.ico'
    });
  }
}

function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// 更新浏览器 tab 标题上的未读数
function updateTitleBadge() {
  const total = Object.values(unread).reduce((a, b) => a + b, 0);
  document.title = total > 0 ? `(${total}) mychat` : 'mychat - 网页版';
}

// 新消息提示音（用 AudioContext 生成短促 beep）
let _audioCtx = null;
function playBeep() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.18);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 0.18);
  } catch {}
}

// ===== TOAST =====
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== UTILS =====
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return '今天';
  const yesterday = new Date(today - 86400000);
  if (d.toDateString() === yesterday.toDateString()) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function formatTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== BUILT-IN BROWSER =====
const _browHistory = [];
let _browHistoryIdx = -1;
let _browLoading = false;
let _browCurrentBlobUrl = null;
let _browProgressTimer = null;

function openBrowser() {
  document.getElementById('browser-modal').classList.add('show');
  document.getElementById('brow-addr').focus();
  document.getElementById('brow-addr').select();
}

function closeBrowser() {
  document.getElementById('browser-modal').classList.remove('show');
}

function _browUpdateNav() {
  document.getElementById('brow-back').disabled    = _browHistoryIdx <= 0;
  document.getElementById('brow-forward').disabled = _browHistoryIdx >= _browHistory.length - 1;
}

function _browSetStatus(txt, loading = false) {
  document.getElementById('brow-status').textContent = txt;
  const sp = document.getElementById('brow-spinner');
  loading ? sp.classList.add('running') : sp.classList.remove('running');
}

// ---- 进度条 NProgress 风格 ----
function _browProgressStart() {
  const bar = document.getElementById('brow-progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  bar.classList.add('loading');
  bar.classList.remove('done');
  // 快速到 30%，然后缓慢推进模拟等待
  requestAnimationFrame(() => {
    bar.style.transition = 'width 0.3s ease';
    bar.style.width = '30%';
    clearTimeout(_browProgressTimer);
    _browProgressTimer = setTimeout(() => {
      bar.style.transition = 'width 2s ease';
      bar.style.width = '70%';
    }, 350);
  });
}

function _browProgressDone() {
  clearTimeout(_browProgressTimer);
  const bar = document.getElementById('brow-progress');
  bar.classList.add('done');
  bar.style.width = '100%';
  setTimeout(() => {
    bar.classList.remove('loading', 'done');
    bar.style.width = '0%';
  }, 600);
}

function _browShowError(msg) {
  document.getElementById('brow-placeholder').style.display = 'none';
  document.getElementById('brow-iframe').style.display = 'none';
  const errBox = document.getElementById('brow-error');
  document.getElementById('brow-error-msg').textContent = msg;
  errBox.classList.add('show');
}

function _browShowIframe(frameUrl, finalUrl, meta) {
  document.getElementById('brow-placeholder').style.display = 'none';
  document.getElementById('brow-error').classList.remove('show');
  const iframe = document.getElementById('brow-iframe');
  iframe.style.display = 'block';

  // 释放旧 Blob URL（兼容旧逻辑）
  if (_browCurrentBlobUrl) {
    URL.revokeObjectURL(_browCurrentBlobUrl);
    _browCurrentBlobUrl = null;
  }

  // 直接用代理帧 URL 作为 iframe.src（避免 Blob URL 的 CSP 限制）
  iframe.src = frameUrl;

  // 更新地址栏
  document.getElementById('brow-addr').value = finalUrl;
  const lock = document.getElementById('brow-lock');
  if (finalUrl.startsWith('https://')) {
    lock.textContent = '🔒'; lock.className = 'browser-lock-icon';
  } else {
    lock.textContent = '🔓'; lock.className = 'browser-lock-icon insecure';
  }
}

async function _browLoad(url) {
  // 如果正在加载同一个URL，跳过；不同URL则强制中断旧请求
  if (_browLoading) {
    _browLoading = false; // 强制中断旧加载，允许新请求
  }
  _browLoading = true;
  // 30秒超时兜底：防止状态永久锁死
  const _thisLoadId = (_browLoad._id = (_browLoad._id || 0) + 1);
  setTimeout(() => {
    if (_browLoad._id === _thisLoadId && _browLoading) {
      _browLoading = false;
      const goBtn = document.getElementById('brow-go-btn');
      if (goBtn) { goBtn.textContent = '前往'; goBtn.onclick = browserGo; goBtn.disabled = false; }
      _browProgressDone();
    }
  }, 30000);

  const goBtn = document.getElementById('brow-go-btn');
  goBtn.textContent = '⏹ 停止';
  goBtn.onclick = () => {
    _browLoading = false;
    _browProgressDone();
    // 停止 iframe 加载
    const iframe = document.getElementById('brow-iframe');
    iframe.src = 'about:blank';
    goBtn.textContent = '前往'; goBtn.onclick = browserGo;
  };

  _browProgressStart();
  _browSetStatus(`正在加载 ${url}...`, true);
  const startTime = Date.now();

  try {
    // 用 POST /api/browse 拿 finalUrl（跟重定向）和状态码；同时给 /api/browse-frame 预热缓存
    const resp = await fetch(`${SERVER}/api/browse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!_browLoading) return;
    const data = await resp.json();
    if (!_browLoading) return;

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (data.ok) {
      // 用 GET /api/browse-frame?url=finalUrl 作为 iframe.src（同源，CSP 友好）
      const finalUrl = data.finalUrl || url;
      const frameUrl = `${SERVER}/api/browse-frame?url=${encodeURIComponent(finalUrl)}`;
      _browShowIframe(frameUrl, finalUrl);
      const cacheHint = data.cached ? ' 〔缓存〕' : '';
      _browSetStatus(`✓ ${finalUrl}  HTTP ${data.statusCode}  ${elapsed}s${cacheHint}`, false);
    } else {
      _browShowError(data.error || '加载失败');
      _browSetStatus(`✗ 加载失败（${elapsed}s）`, false);
    }
  } catch (e) {
    if (!_browLoading) return;
    _browShowError('网络错误：' + e.message);
    _browSetStatus('✗ 请求失败', false);
  } finally {
    _browLoading = false;
    _browProgressDone();
    goBtn.textContent = '前往';
    goBtn.onclick = browserGo;
    goBtn.disabled = false;
    _browUpdateNav();
  }
}

function browserNav(url) {
  _browHistory.splice(_browHistoryIdx + 1);
  _browHistory.push(url);
  _browHistoryIdx = _browHistory.length - 1;
  _browLoad(url);
  document.getElementById('brow-addr').value = url;
}

function browserGo() {
  let url = document.getElementById('brow-addr').value.trim();
  if (!url) return;
  if (!/[.:/]/.test(url.replace(/^https?:\/\//i, '')) && !/^https?:\/\//i.test(url)) {
    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
  }
  browserNav(url);
}

function browserBack() {
  if (_browHistoryIdx <= 0) return;
  _browHistoryIdx--;
  const url = _browHistory[_browHistoryIdx];
  document.getElementById('brow-addr').value = url;
  _browLoad(url);
}

function browserForward() {
  if (_browHistoryIdx >= _browHistory.length - 1) return;
  _browHistoryIdx++;
  const url = _browHistory[_browHistoryIdx];
  document.getElementById('brow-addr').value = url;
  _browLoad(url);
}

function browserRefresh() {
  const url = document.getElementById('brow-addr').value.trim();
  // 刷新时跳过缓存：直接调 _browLoad
  if (url) {
    _browHistory.splice(_browHistoryIdx + 1);
    _browHistory.push(url);
    _browHistoryIdx = _browHistory.length - 1;
    _browLoad(url);
  }
}

function browserHome() {
  browserNav('https://www.google.com');
}

// 接收 iframe 内的导航消息（页面内链接点击）
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'browse-navigate') {
    browserNav(e.data.url);
  }
});

// ===== PING =====
function openPing() {
  document.getElementById('ping-modal').classList.add('show');
  document.getElementById('ping-host').focus();
  document.getElementById('ping-host').select();
}

function closePing() {
  document.getElementById('ping-modal').classList.remove('show');
}

function setPingHost(host) {
  document.getElementById('ping-host').value = host;
  document.getElementById('ping-host').focus();
}

let _pingRunning = false;

async function doPing() {
  if (_pingRunning) return;
  const host = document.getElementById('ping-host').value.trim();
  if (!host) return;
  const count = parseInt(document.getElementById('ping-count').value) || 4;

  _pingRunning = true;
  const runBtn = document.getElementById('ping-run-btn');
  const spinner = document.getElementById('ping-spinner');
  const statusEl = document.getElementById('ping-status-text');
  const resultBox = document.getElementById('ping-result');

  runBtn.disabled = true;
  runBtn.textContent = '运行中...';
  spinner.classList.add('running');
  statusEl.textContent = `正在 Ping ${host}...`;
  resultBox.innerHTML = `<span class="line-dim">正在解析 ${escHtml(host)}...</span>`;

  try {
    const resp = await fetch(`${SERVER}/api/ping`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ host, count })
    });
    const data = await resp.json();
    renderPingResult(data);
  } catch (e) {
    resultBox.innerHTML = `<span class="line-fail">请求失败：${escHtml(e.message)}</span>`;
    statusEl.textContent = '出错了';
  } finally {
    _pingRunning = false;
    runBtn.disabled = false;
    runBtn.textContent = '▶ Ping';
    spinner.classList.remove('running');
  }
}

function renderPingResult(data) {
  const resultBox = document.getElementById('ping-result');
  const statusEl = document.getElementById('ping-status-text');

  if (data.error) {
    resultBox.innerHTML = `<span class="line-fail">✗ ${escHtml(data.error)}</span>`;
    statusEl.textContent = '解析失败';
    return;
  }

  const lines = [];

  // 头部
  lines.push(`<span class="line-info">PING ${escHtml(data.host)} (${escHtml(data.ip)}) 端口 ${data.port}</span>`);
  lines.push(`<span class="line-dim">DNS 解析耗时: ${data.stats.dnsMs} ms</span>`);
  lines.push('');

  // 每轮结果
  data.results.forEach(r => {
    if (r.success) {
      const note = r.note ? ` <span class="line-dim">(${escHtml(r.note)})</span>` : '';
      lines.push(`<span class="line-ok">第 ${r.seq} 次：来自 ${escHtml(data.ip)} 延迟 = ${r.ms} ms${note}</span>`);
    } else {
      lines.push(`<span class="line-fail">第 ${r.seq} 次：请求超时${r.error ? ' — ' + escHtml(r.error) : ''}</span>`);
    }
  });

  // 统计摘要
  const s = data.stats;
  lines.push('');
  lines.push(`<span class="line-stat">─── 统计 ───────────────────────────</span>`);
  lines.push(`<span class="line-stat">  发送: ${s.sent}  接收: ${s.received}  丢包: ${s.lost} (${s.lossRate})</span>`);
  if (s.received > 0) {
    lines.push(`<span class="line-stat">  最小: ${s.minMs} ms  最大: ${s.maxMs} ms  平均: ${s.avgMs} ms</span>`);
  }
  lines.push(`<span class="line-stat">─────────────────────────────────────</span>`);

  resultBox.innerHTML = lines.join('\n');
  resultBox.scrollTop = resultBox.scrollHeight;

  // 状态栏
  const lossNum = parseInt(s.lossRate);
  if (lossNum === 0) {
    statusEl.textContent = `✓ ${data.host} 可达，平均 ${s.avgMs} ms`;
  } else if (lossNum === 100) {
    statusEl.textContent = `✗ ${data.host} 不可达 (100% 丢包)`;
  } else {
    statusEl.textContent = `⚠ ${data.host} 部分可达，丢包 ${s.lossRate}`;
  }
}
